<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASA Manager Pro - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-200 p-6 min-h-screen">

<div class="max-w-[1600px] mx-auto space-y-6">
    <header class="flex justify-between items-center border-b border-slate-700 pb-4">
        <div>
            <a href="/" class="text-xs text-blue-400 hover:underline uppercase tracking-wider font-bold">
                <i class="fa fa-arrow-left mr-1"></i> <span data-i18n="rcon_back_dashboard">Back to Dashboard</span>
            </a>
            <h1 class="text-3xl font-extrabold text-white tracking-tight mt-1 font-mono" data-i18n="rcon_title">RCON Command Center</h1>
        </div>
        <div id="rcon-status" class="bg-emerald-600/20 text-emerald-400 px-4 py-2 rounded-lg font-bold border border-emerald-600/50 flex items-center gap-2">
            <i class="fa fa-plug"></i> <span id="rcon-status-text" data-i18n="rcon_status_connected">Connected</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

        <div class="lg:col-span-4 space-y-6">

            <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl">
                <h3 class="text-sm font-bold text-cyan-400 border-b border-slate-700 pb-2 mb-4 uppercase tracking-wider">
                    <i class="fa fa-bolt mr-2"></i><span data-i18n="rcon_quick_actions">Quick Actions</span>
                </h3>
                <div id="quick-action-grid" class="grid grid-cols-2 gap-2"></div>
            </div>

            <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl">
                <h3 class="text-sm font-bold text-cyan-400 border-b border-slate-700 pb-2 mb-4 uppercase tracking-wider">
                    <i class="fa fa-satellite-dish mr-2"></i><span data-i18n="rcon_comm_link">Global Comm-Link</span>
                </h3>
                <div class="space-y-3 text-sm">
                    <div class="flex gap-2">
                        <select id="chat-type" class="bg-black border border-slate-600 text-white px-2 py-1.5 rounded outline-none focus:border-cyan-500 font-bold w-1/2"></select>
                        <input id="chat-sender" type="text" placeholder="Sender (Admin)" value="Admin" class="w-1/2 bg-black border border-slate-600 text-white px-2 py-1.5 rounded outline-none focus:border-cyan-500">
                    </div>
                    <div class="flex gap-2">
                        <input id="chat-message" type="text" placeholder="Type message..." onkeypress="if(event.key === 'Enter') sendChat()" class="flex-1 bg-black border border-slate-600 text-white px-3 py-2 rounded outline-none focus:border-cyan-500">
                        <button onclick="sendChat()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-2 rounded transition"><i class="fa fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl flex flex-col h-[300px]">
                <div class="flex justify-between items-center border-b border-slate-700 pb-2 mb-3">
                    <h3 class="text-sm font-bold text-cyan-400 uppercase tracking-wider">
                        <i class="fa fa-users mr-2"></i><span data-i18n="rcon_active_players">Active Players</span>
                    </h3>
                    <button onclick="fetchPlayers()" class="text-slate-400 hover:text-cyan-400 transition" title="Refresh Now"><i class="fa fa-sync-alt"></i></button>
                </div>
                <div class="flex-1 overflow-y-auto">
                    <table class="w-full text-left text-xs">
                        <tbody id="player-list-body" class="divide-y divide-slate-800/50">
                        <tr><td class="p-2 text-center text-slate-500 italic" data-i18n="rcon_polling">Polling server...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <div class="lg:col-span-8 flex flex-col bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl h-[750px] max-h-[85vh]">

            <div class="flex justify-between items-center border-b border-slate-700 pb-3 mb-3">
                <h3 class="text-lg font-bold text-cyan-400 uppercase tracking-wider">
                    <i class="fa fa-terminal mr-2"></i><span data-i18n="rcon_live_log">Live Server Log & Console</span>
                </h3>

                <div class="flex gap-1 bg-black/50 p-1 rounded-lg border border-slate-700">
                    <button onclick="setLogFilter('all')" id="filter-all" class="filter-btn active bg-slate-700 text-white px-3 py-1 rounded text-xs font-bold transition" data-i18n="rcon_filter_all">All</button>
                    <button onclick="setLogFilter('chat')" id="filter-chat" class="filter-btn text-slate-400 hover:text-white px-3 py-1 rounded text-xs font-bold transition" data-i18n="rcon_filter_chat">Chat</button>
                    <button onclick="setLogFilter('kill')" id="filter-kill" class="filter-btn text-slate-400 hover:text-white px-3 py-1 rounded text-xs font-bold transition" data-i18n="rcon_filter_deaths">Deaths</button>
                    <button onclick="setLogFilter('tame')" id="filter-tame" class="filter-btn text-slate-400 hover:text-white px-3 py-1 rounded text-xs font-bold transition" data-i18n="rcon_filter_tames">Tames</button>
                    <button onclick="setLogFilter('join')" id="filter-join" class="filter-btn text-slate-400 hover:text-white px-3 py-1 rounded text-xs font-bold transition" data-i18n="rcon_filter_joins">Joins/Leaves</button>
                </div>
            </div>

            <div id="live-console-output" class="flex-1 bg-[#0a0a0c] border border-slate-700 rounded-lg p-4 overflow-y-auto font-mono text-xs text-slate-300 shadow-inner whitespace-pre-wrap leading-relaxed space-y-1">
                <span class="text-slate-500 italic" data-i18n="rcon_connecting">Connecting to live stream...</span>
            </div>

            <div class="mt-4 flex gap-2">
                <div class="bg-black border border-slate-600 rounded flex items-center px-3 text-cyan-500 font-bold">></div>
                <input id="raw-command-input" type="text" placeholder="Send RCON command (e.g. DoExit, saveworld)..." onkeypress="if(event.key === 'Enter') sendRawCommand()" class="flex-1 bg-black border border-slate-600 text-white px-3 py-2 rounded outline-none focus:border-cyan-500 font-mono text-sm shadow-inner">
            </div>

        </div>

    </div>
</div>

<script src="/js/i18n.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/rcon-ui.js"></script>
</body>
</html>
